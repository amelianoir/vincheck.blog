name: Deploy to VPS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Next.js
      run: npm run build
      
    - name: Deploy to VPS
      uses: easingthemes/ssh-deploy@main
      with:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
        REMOTE_USER: ${{ secrets.REMOTE_USER }}
        SOURCE: "out/"
        TARGET: "/home/vincheck.blog/public_html/"
        ARGS: "-rlgoDzvc -i --delete"
        SCRIPT_BEFORE: |
          rm -rf /home/vincheck.blog/public_html/*
        SCRIPT_AFTER: |
          chmod -R 755 /home/vincheck.blog/public_html
